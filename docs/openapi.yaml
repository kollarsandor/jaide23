openapi: 3.1.0
info:
  title: Kollar Platform API
  version: 1.0.0
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /api/health:
    get:
      responses:
        "200": {description: ok}
  /api/auth/signup:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email,password]
              properties:
                email: {type: string}
                password: {type: string}
      responses:
        "200": {description: ok}
  /api/auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email,password]
              properties:
                email: {type: string}
                password: {type: string}
      responses:
        "200": {description: ok}
  /api/auth/refresh:
    post:
      responses:
        "200": {description: ok}
  /api/projects:
    get:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
    post:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
  /api/projects/by_slug:
    get:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
  /api/workspace/{projectId}/files:
    get:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
  /api/workspace/{projectId}/file:
    get:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
    put:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
  /api/session/token:
    post:
      security: [{bearerAuth: []}]
      responses:
        "200": {description: ok}
